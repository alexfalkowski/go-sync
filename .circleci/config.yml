version: 2.1

commands:
  sync-submodules:
    steps:
      - run: git submodule sync
      - run: git submodule update --init
  checkout-submodules:
    steps:
      - checkout:
          method: blobless
      - sync-submodules

executors:
  go:
    docker:
      - image: alexfalkowski/go:4.24
  release:
    docker:
      - image: alexfalkowski/release:8.22
  alpine:
    docker:
      - image: alpine:latest

jobs:
  build:
    executor: go
    working_directory: ~/go-sync
    steps:
      - checkout-submodules
      - run: make source-key
      - restore_cache:
          name: restore go cache
          keys:
            - go-sync-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
            - go-sync-go-cache-
      - run: make clean
      - run: make dep
      - save_cache:
          name: save go cache
          key: go-sync-go-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
          paths:
            - ~/go/pkg/mod
      - restore_cache:
          name: restore go build cache
          keys:
            - go-sync-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - go-sync-go-build-cache-
      - restore_cache:
          name: restore go lint cache
          keys:
            - go-sync-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
            - go-sync-go-lint-cache-
      - run: make clean
      - run: make lint
      - save_cache:
          name: save go lint cache
          key: go-sync-go-lint-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/golangci-lint
      - run: make sec
      - run: make specs
      - run: make benchmarks
      - run: make fuzzes
      - save_cache:
          name: save go build cache
          key: go-sync-go-build-cache-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/go-build
      - run: make coverage
      - store_test_results:
          path: test/reports
      - store_artifacts:
          path: test/reports
      - run: make codecov-upload
    resource_class: arm.large
  sync:
    executor: release
    working_directory: ~/go-sync
    steps:
      - checkout-submodules
      - run: make sync push
    resource_class: arm.large
  version:
    executor: release
    working_directory: ~/go-sync
    steps:
      - checkout-submodules
      - run: version
      - run: package
    resource_class: arm.large
  wait-all:
    executor: alpine
    resource_class: small
    steps:
      - run: echo "all applicable jobs finished"

workflows:
  go-sync:
    max_auto_reruns: 3
    jobs:
      - build
      - sync:
          requires:
            - build
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - build
          filters:
            branches:
              only: master
      - wait-all:
          requires:
            - build
            - sync
            - version
